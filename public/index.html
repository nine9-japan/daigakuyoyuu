<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>録音ノート</title>
    <link rel="stylesheet" href="styles.css?v=6">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>録音ノート</h1>
          <p id="appStatus" class="status-line">待機中</p>
        </div>
        <div class="top-actions">
          <input id="titleInput" class="title-input" type="text" maxlength="80" placeholder="タイトル">
          <select id="languageSelect" class="select-input" aria-label="文字起こし言語">
            <option value="ja-JP">日本語</option>
            <option value="en-US">English</option>
            <option value="ko-KR">한국어</option>
            <option value="zh-CN">中文</option>
          </select>
          <select id="noteModeSelect" class="select-input" aria-label="ノート形式">
            <option value="simple" selected>簡易ノート</option>
            <option value="detailed">詳細ノート</option>
          </select>
          <button id="apiSettingsButton" class="ghost-button" type="button">API設定</button>
          <button id="adminMenuButton" class="ghost-button" type="button">管理者</button>
          <button id="historyButton" class="ghost-button" type="button">履歴</button>
        </div>
      </header>

      <section class="recorder-surface" aria-label="録音">
        <div class="record-state">
          <span id="recordDot" class="record-dot"></span>
          <span id="recordTimer" class="timer">00:00</span>
          <span id="retentionText" class="retention">音声保存: 7日間</span>
        </div>
        <div class="record-actions">
          <button id="startButton" class="primary-button" type="button">録音開始</button>
          <button id="stopButton" class="danger-button" type="button" disabled>停止</button>
        </div>
        <input id="audioFileInput" class="file-input" type="file" accept="audio/*" capture>
      </section>

      <main class="workspace">
        <aside id="historyPanel" class="history-panel" aria-label="保存済み" aria-hidden="true">
          <div class="panel-heading">
            <h2>保存済み</h2>
            <div class="panel-actions">
              <button id="refreshButton" class="ghost-button compact-button" type="button">更新</button>
              <button id="closeHistoryButton" class="ghost-button compact-button" type="button">閉じる</button>
            </div>
          </div>
          <div id="recordList" class="record-list"></div>
        </aside>

        <section class="editor-panel" aria-label="ノート">
          <div class="selected-header">
            <div>
              <h2 id="selectedTitle">新規録音</h2>
              <p id="selectedMeta" class="muted">音声・文字起こし・ノート</p>
            </div>
            <div class="selected-actions">
              <button id="copyNoteButton" class="secondary-button" type="button">ノートをコピー</button>
              <button id="exportPdfButton" class="ghost-button" type="button">PDF出力</button>
              <button id="exportFilesButton" class="ghost-button" type="button" hidden>ファイル書き出し</button>
              <button id="saveNoteButton" class="ghost-button" type="button">履歴に保存</button>
            </div>
          </div>

          <audio id="audioPlayer" class="audio-player" controls hidden></audio>

          <div class="text-grid">
            <label class="text-block">
              <span>文字起こし</span>
              <textarea id="transcriptArea" spellcheck="true"></textarea>
            </label>
            <label class="text-block">
              <span>AIノート</span>
              <textarea id="noteArea" spellcheck="true"></textarea>
            </label>
          </div>
        </section>
      </main>
    </div>
    <div id="historyOverlay" class="history-overlay" hidden></div>
    <div id="apiSettingsOverlay" class="history-overlay" hidden></div>
    <div id="adminMenuOverlay" class="history-overlay" hidden></div>
    <div id="personalApiNoticeOverlay" class="history-overlay" hidden></div>
    <section id="personalApiNoticePanel" class="settings-panel notice-panel" aria-label="個人APIキーのお願い" aria-hidden="true">
      <div class="panel-heading">
        <h2>お願い</h2>
        <button id="closePersonalApiNoticeButton" class="ghost-button compact-button" type="button">閉じる</button>
      </div>
      <div class="settings-body">
        <p class="notice-copy">
          AI文字起こしとノート作成は、できるだけ自分のAPIキーを使ってください。管理者キーも使えますが、利用が集中すると管理者側に料金がかかります。
        </p>
        <label class="switch-row">
          <input id="hidePersonalApiNoticeInput" type="checkbox">
          <span>今後は表示しない</span>
        </label>
        <div class="settings-actions">
          <button id="openApiSettingsFromNoticeButton" class="primary-button" type="button">API設定を開く</button>
          <button id="dismissPersonalApiNoticeButton" class="ghost-button" type="button">あとで</button>
        </div>
      </div>
    </section>
    <section id="apiSettingsPanel" class="settings-panel" aria-label="API設定" aria-hidden="true">
      <div class="panel-heading">
        <h2>API設定</h2>
        <button id="closeApiSettingsButton" class="ghost-button compact-button" type="button">閉じる</button>
      </div>
      <div class="settings-body">
        <label class="switch-row">
          <input id="usePersonalApiKeyInput" type="checkbox">
          <span>自分のAPIキーを使う</span>
        </label>
        <label class="settings-field">
          <span>個人APIキー</span>
          <input id="personalApiKeyInput" class="title-input settings-input" type="password" autocomplete="off" placeholder="sk-...">
        </label>
        <div class="settings-actions">
          <button id="saveApiSettingsButton" class="primary-button" type="button">保存</button>
          <button id="clearApiSettingsButton" class="ghost-button" type="button">削除</button>
        </div>
        <p id="apiSettingsStatus" class="status-line">標準では管理者のAPIキーを使います。</p>
      </div>
    </section>

    <section id="adminMenuPanel" class="settings-panel" aria-label="管理者メニュー" aria-hidden="true">
      <div class="panel-heading">
        <h2>管理者メニュー</h2>
        <button id="closeAdminMenuButton" class="ghost-button compact-button" type="button">閉じる</button>
      </div>
      <div class="settings-body">
        <div class="admin-info-row">
          <span>バージョン</span>
          <strong id="appVersionText">-</strong>
        </div>
        <div class="admin-info-row">
          <span>通常機能の本日残り</span>
          <strong id="basicUsageText">-</strong>
        </div>
        <div class="settings-actions">
          <label class="file-button" for="audioFileInput">音声ファイルを追加</label>
          <button id="retryTranscriptButton" class="ghost-button" type="button">再文字起こし</button>
        </div>
        <label class="switch-row">
          <input id="disableDailyLimitInput" type="checkbox">
          <span>通常ユーザーの1日4回制限を外す</span>
        </label>
        <div class="admin-log">
          <div class="admin-log-heading">
            <span>簡単なエラーログ</span>
            <button id="clearErrorLogButton" class="ghost-button compact-button" type="button">消去</button>
          </div>
          <div id="errorLogList" class="error-log-list"></div>
        </div>
      </div>
    </section>

    <template id="recordItemTemplate">
      <div class="record-item">
        <button class="record-open" type="button">
          <span class="record-title"></span>
          <span class="record-meta"></span>
          <span class="record-badge"></span>
        </button>
        <button class="record-delete" type="button">削除</button>
      </div>
    </template>

    <script src="app.js?v=14"></script>
  </body>
</html>
